services:
  - type: web
    name: solvit-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend_py/requirements.txt
    startCommand: cd backend_py && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        scope: build
      - key: PYTHON_VERSION
        value: "3.11"

  - type: static_site
    name: solvit-frontend
    env: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    routes:
      - path: /api
        destination: http://solvit-backend.onrender.com
